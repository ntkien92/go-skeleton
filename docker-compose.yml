services:
  db:
    image: mysql:9.6.0
    container_name: mysql_db
    environment:
      - MYSQL_DATABASE=blogs
      - MYSQL_USER=user
      - MYSQL_PASSWORD=12345678
      - MYSQL_ROOT_PASSWORD=12345678
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blog-api-network
